<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Recipe</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, sans-serif;
      background: #f4f1f6;
      color: #333;
      padding: 22px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .back-btn, .save-btn, .format-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: white;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      cursor: pointer;
      font-size: 0.95rem;
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 1rem;
      font-family: Tahoma, sans-serif;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 8px 25px rgba(0,0,0,0.06);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    #rawRecipe {
      min-height: 220px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .save-btn {
      background: #fff7c7;
    }

    .hint {
      color: #777;
      font-size: 0.85rem;
      margin-top: 8px;
    }
	
	@media (max-width: 600px) {
  body {
    padding: 16px;
  }

  h1 {
    font-size: 1.55rem;
  }

  .header {
    align-items: flex-start;
  }

  .add-btn,
  .back-btn,
  .save-btn,
  .format-btn {
    padding: 10px 14px;
    font-size: 0.9rem;
  }

  input,
  textarea {
    font-size: 16px;
  }
}


  </style>
</head>

<body>
  <div class="header">
    <button class="back-btn" onclick="location.href='recipes.html'">← Back</button>
    <h1>Add Recipe</h1>
  </div>

  <label>Paste full recipe</label>
  <textarea id="rawRecipe" placeholder="Paste recipe here..."></textarea>

<label>Or scan recipe photo</label>
<input id="photoInput" type="file" accept="image/*" />

<div class="actions">
  <button class="format-btn" id="ocrBtn">Read Photo</button>
</div>

<div id="ocrStatus" class="hint"></div>

  <div class="actions">
	<button class="format-btn" id="cleanBtn">Clean Text</button>
    <button class="format-btn" id="formatBtn">Auto-format</button>
    <button class="save-btn" id="saveBtn">Save Recipe</button>
  </div>

  <div class="hint">
    Tip: Works best if the recipe has headings like Ingredients, Instructions, Method, or Directions.
  </div>

  <label>Recipe title</label>
  <input id="titleInput" placeholder="Recipe title" />

  <label>Ingredients</label>
  <textarea id="ingredientsInput" placeholder="One ingredient per line"></textarea>

  <label>Instructions</label>
  <textarea id="instructionsInput" placeholder="One step per line"></textarea>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAvoNBFAEWNDptC8JIJ2TeuczKuFFmbJVk",
    authDomain: "expenses-a18fa.firebaseapp.com",
    projectId: "expenses-a18fa",
    storageBucket: "expenses-a18fa.appspot.com",
    messagingSenderId: "710897249151",
    appId: "1:710897249151:web:10a31240f099d8e328c84a",
    measurementId: "G-Z0TNKB1L00"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const rawRecipe = document.getElementById("rawRecipe");
  const titleInput = document.getElementById("titleInput");
  const ingredientsInput = document.getElementById("ingredientsInput");
  const instructionsInput = document.getElementById("instructionsInput");
  const formatBtn = document.getElementById("formatBtn");
  const saveBtn = document.getElementById("saveBtn");
  const photoInput = document.getElementById("photoInput");
  const ocrBtn = document.getElementById("ocrBtn");
  const ocrStatus = document.getElementById("ocrStatus");
  const cleanBtn = document.getElementById("cleanBtn");

  function cleanLine(line) {
    return line
      .replace(/^[-•*]\s*/, "")
      .replace(/^\d+[\).\s-]+/, "")
      .replace(/\s{2,}/g, " ")
      .trim();
  }

  function cleanOCRText(text) {
    return text
      .replace(/[|~^_=<>[\]{}]/g, " ")
      .replace(/[“”]/g, '"')
      .replace(/[‘’]/g, "'")
      .replace(/[`´]/g, "'")
      .replace(/[•·●]/g, "-")
      .replace(/\s{2,}/g, " ")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
  }
  
  function smartCleanRecipeText(text) {
  return text
    .split(/\r?\n/)
    .map(line => line.trim())
    .filter(line => line.length > 2)
    .filter(line => !/(allergens|hellofresh|foodinfo|received a substitute|product labels)/i.test(line))
    .filter(line => !/^[^a-zA-Z0-9]+$/.test(line))
    .filter(line => !/[A-Z]{4,}.*[A-Z]{4,}.*[A-Z]{4,}/.test(line))
    .map(line => line
      .replace(/[|~^_=<>[\]{}]/g, " ")
      .replace(/[“”]/g, '"')
      .replace(/[‘’]/g, "'")
      .replace(/[•·●]/g, "-")
      .replace(/\s{2,}/g, " ")
      .trim()
    )
    .filter(Boolean)
    .join("\n");
}

  function autoFormatRecipe(text) {
    const lines = cleanOCRText(text)
      .split(/\r?\n/)
      .map(line => line.trim())
      .filter(Boolean);

    let title = lines[0] || "Untitled Recipe";
    let ingredients = [];
    let instructions = [];

    function looksLikeInstruction(line) {
      const lower = line.toLowerCase();

      return (
        /^\d+[\).\s-]/.test(line) ||
        /^(add|mix|cook|boil|fry|bake|stir|pour|heat|serve|place|combine|simmer|drain|reduce|bring|cut|chop|slice|toss|garnish|season|plate)\b/i.test(lower)
      );
    }

    function looksLikeIngredient(line) {
      const lower = line.toLowerCase();

      return (
        /\b\d+\s?(g|kg|ml|l|cup|cups|tbsp|tsp|tablespoon|teaspoon|pkt|pack|can|clove|cloves|bottle)\b/i.test(line) ||
        /(salt|pepper|oil|garlic|onion|chicken|beef|pork|fish|egg|flour|sugar|milk|butter|cream|cheese|pesto|spinach|almond|courgette|fettuccine|parmesan)/i.test(lower)
      );
    }

    for (let i = 1; i < lines.length; i++) {
      const line = cleanLine(lines[i]);
      const lower = line.toLowerCase();

      if (!line) continue;

      if (
        lower.includes("ingredients") ||
        lower.includes("you need") ||
        lower.includes("from the pantry") ||
        lower.includes("from the cool pouch") ||
        lower.includes("allergens")
      ) {
        continue;
      }

      if (looksLikeInstruction(line)) {
        instructions.push(line);
      } else if (looksLikeIngredient(line)) {
        ingredients.push(line);
      }
    }

    return { title, ingredients, instructions };
  }

  function preprocessImage(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();

      img.onload = () => {
        const scale = 2;
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width * scale;
        canvas.height = img.height * scale;

        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
          const grey = data[i] * 0.3 + data[i + 1] * 0.59 + data[i + 2] * 0.11;
          const contrast = grey > 155 ? 255 : 0;

          data[i] = contrast;
          data[i + 1] = contrast;
          data[i + 2] = contrast;
        }

        ctx.putImageData(imageData, 0, 0);

        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error("Image processing failed"));
        }, "image/png");
      };

      img.onerror = reject;
      img.src = URL.createObjectURL(file);
    });
  }
  
  cleanBtn.addEventListener("click", () => {
  const text = rawRecipe.value.trim();

  if (!text) {
    alert("Nothing to clean yet.");
    return;
  }

  rawRecipe.value = smartCleanRecipeText(text);
});

  formatBtn.addEventListener("click", () => {
    const text = rawRecipe.value.trim();

    if (!text) {
      alert("Paste a recipe first.");
      return;
    }

    const result = autoFormatRecipe(text);

    titleInput.value = result.title || "";
    ingredientsInput.value = result.ingredients.join("\n");
    instructionsInput.value = result.instructions.join("\n");
  });

  ocrBtn.addEventListener("click", async () => {
    const file = photoInput.files[0];

    if (!file) {
      alert("Choose or take a photo first.");
      return;
    }

    ocrBtn.disabled = true;
    ocrBtn.textContent = "Reading...";
    ocrStatus.textContent = "Preparing image...";

    try {
      const processedImage = await preprocessImage(file);

      const result = await Tesseract.recognize(processedImage, "eng", {
        logger: m => {
          if (m.status && m.progress) {
            ocrStatus.textContent = `${m.status} ${Math.round(m.progress * 100)}%`;
          }
        }
      });

      const cleanedText = cleanOCRText(result.data.text);

      rawRecipe.value = rawRecipe.value
        ? rawRecipe.value + "\n\n" + cleanedText
        : cleanedText;

      ocrStatus.textContent = "Done. Check the text, then click Auto-format.";
    } catch (error) {
      console.error(error);
      ocrStatus.textContent = "Could not read photo. Try a closer cropped photo.";
    }

    ocrBtn.textContent = "Read Photo";
    ocrBtn.disabled = false;
  });

  saveBtn.addEventListener("click", async () => {
  
  if (rawRecipe.value.trim() && (!titleInput.value.trim() || !ingredientsInput.value.trim() || !instructionsInput.value.trim())) {
  const result = autoFormatRecipe(rawRecipe.value.trim());

  if (!titleInput.value.trim()) {
    titleInput.value = result.title || "";
  }

  if (!ingredientsInput.value.trim()) {
    ingredientsInput.value = result.ingredients.join("\n");
  }

  if (!instructionsInput.value.trim()) {
    instructionsInput.value = result.instructions.join("\n");
  }
}
    const title = titleInput.value.trim();

    const ingredients = ingredientsInput.value
      .split(/\r?\n/)
      .map(line => line.trim())
      .filter(Boolean);

    const instructions = instructionsInput.value
      .split(/\r?\n/)
      .map(line => line.trim())
      .filter(Boolean);

    if (!title) {
      alert("Please add a recipe title.");
      return;
    }

    if (ingredients.length === 0 && instructions.length === 0) {
      alert("Please add ingredients or instructions.");
      return;
    }

    saveBtn.disabled = true;
    saveBtn.textContent = "Saving...";

    try {
      await addDoc(collection(db, "recipes"), {
        title,
        ingredients,
        instructions,
        rawText: rawRecipe.value.trim(),
        photoUrl: "",
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });

      location.href = "recipes.html";
    } catch (error) {
      console.error(error);
      alert("Could not save recipe. Check Firestore rules.");
      saveBtn.disabled = false;
      saveBtn.textContent = "Save Recipe";
    }
  });
</script>
</body>
</html>
