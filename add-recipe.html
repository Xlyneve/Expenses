<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Recipe</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, sans-serif;
      background: #f4f1f6;
      color: #333;
      padding: 22px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .back-btn, .save-btn, .format-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: white;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      cursor: pointer;
      font-size: 0.95rem;
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 1rem;
      font-family: Tahoma, sans-serif;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 8px 25px rgba(0,0,0,0.06);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    #rawRecipe {
      min-height: 220px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .save-btn {
      background: #fff7c7;
    }

    .hint {
      color: #777;
      font-size: 0.85rem;
      margin-top: 8px;
    }
	
	@media (max-width: 600px) {
  body {
    padding: 16px;
  }

  h1 {
    font-size: 1.55rem;
  }

  .header {
    align-items: flex-start;
  }

  .add-btn,
  .back-btn,
  .save-btn,
  .format-btn {
    padding: 10px 14px;
    font-size: 0.9rem;
  }

  input,
  textarea {
    font-size: 16px;
  }
}


  </style>
</head>

<body>
  <div class="header">
    <button class="back-btn" onclick="location.href='recipes.html'">← Back</button>
    <h1>Add Recipe</h1>
  </div>

  <label>Paste full recipe</label>
  <textarea id="rawRecipe" placeholder="Paste recipe here..."></textarea>

<label>Or scan recipe photo</label>
<input id="photoInput" type="file" accept="image/*" />

<div class="actions">
  <button class="format-btn" id="ocrBtn">Read Photo</button>
</div>

<div id="ocrStatus" class="hint"></div>

  <div class="actions">
	<button class="format-btn" id="cleanBtn">Clean Text</button>
    <button class="format-btn" id="formatBtn">Auto-format</button>
    <button class="save-btn" id="saveBtn">Save Recipe</button>
  </div>

  <div class="hint">
    Tip: Works best if the recipe has headings like Ingredients, Instructions, Method, or Directions.
  </div>

  <label>Recipe title</label>
  <input id="titleInput" placeholder="Recipe title" />

  <label>Ingredients</label>
  <textarea id="ingredientsInput" placeholder="One ingredient per line"></textarea>

  <label>Instructions</label>
  <textarea id="instructionsInput" placeholder="One step per line"></textarea>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAvoNBFAEWNDptC8JIJ2TeuczKuFFmbJVk",
    authDomain: "expenses-a18fa.firebaseapp.com",
    projectId: "expenses-a18fa",
    storageBucket: "expenses-a18fa.appspot.com",
    messagingSenderId: "710897249151",
    appId: "1:710897249151:web:10a31240f099d8e328c84a",
    measurementId: "G-Z0TNKB1L00"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const rawRecipe = document.getElementById("rawRecipe");
  const titleInput = document.getElementById("titleInput");
  const ingredientsInput = document.getElementById("ingredientsInput");
  const instructionsInput = document.getElementById("instructionsInput");
  const formatBtn = document.getElementById("formatBtn");
  const saveBtn = document.getElementById("saveBtn");
  const photoInput = document.getElementById("photoInput");
  const ocrBtn = document.getElementById("ocrBtn");
  const ocrStatus = document.getElementById("ocrStatus");
  const cleanBtn = document.getElementById("cleanBtn");

 

  function cleanLine(line) {
  return line
    .replace(/^[-•*]\s*/, "")
    .replace(/^\d+[\).\s-]+/, "")
    .replace(/\s{2,}/g, " ")
    .trim();
}

function cleanOCRText(text) {
  return text
    .replace(/[|~^_=<>[\]{}]/g, " ")
    .replace(/[“”]/g, '"')
    .replace(/[‘’]/g, "'")
    .replace(/[`´]/g, "'")
    .replace(/[•·●]/g, "-")
    .replace(/[^\S\r\n]{2,}/g, " ")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
}

function isHeading(line) {
  return /^(ingredients?|instructions?|method|directions?|steps?|get prepared|cook the veggies|make the mash|cook the beef|make the sauce|serve up|enjoy)[\s:]*$/i.test(line);
}

function isInstructionLine(line) {
  const l = line.trim().toLowerCase();

  return (
    /[.!?]$/.test(l) ||
    /^(bring|peel|cut|trim|slice|finely|cook|place|add|cover|steam|transfer|season|drain|return|mash|heat|when|while|toss|stir|serve|divide|top|reduce|boil|simmer|combine|mix|pour|remove)/i.test(l) ||
    /\b(until|then|about|minutes?|medium|high heat|low heat|fragrant|cooked through|keep warm|to the boil)\b/i.test(l)
  );
}

function isIngredientLine(line) {
  const l = line.trim().toLowerCase();

  if (!l) return false;
  if (isHeading(l)) return false;
  if (isInstructionLine(l)) return false;

  return (
    /\b(cup|cups|tsp|tbsp|tbs|g|kg|ml|l|packet|sachet|bottle|clove|cloves|potato|potatoes|parsnip|carrot|beans|garlic|beef|cream|mustard|paste|butter|milk|salt|pepper|oil|seasoning|powder)\b/i.test(l) ||
    /^[\d\/.\s]+[a-z]/i.test(l)
  );
}

function smartCleanRecipeText(text) {
  return cleanOCRText(text)
    .split(/\r?\n/)
    .map(line => line.trim())
    .filter(line => line.length > 1)
    .filter(line => !/(allergens|hellofresh|foodinfo|received a substitute|product labels|nutrition|pantry items|grab your meal kit)/i.test(line))
    .filter(line => !/^[^a-zA-Z0-9]+$/.test(line))
    .map(line => cleanLine(line))
    .filter(Boolean)
    .join("\n");
}

function autoFormatRecipe(text) {
  const lines = smartCleanRecipeText(text)
    .split(/\r?\n/)
    .map(l => l.trim())
    .filter(Boolean);

  let title = lines[0] || "Untitled Recipe";
  let ingredients = [];
  let instructions = [];
  let mode = "";

  const seenIngredients = new Set();
  const seenInstructions = new Set();

  for (let i = 1; i < lines.length; i++) {
    let line = cleanLine(lines[i]);
    let lower = line.toLowerCase();

    if (!line) continue;

    if (/^ingredients?:?$/i.test(line)) {
      mode = "ingredients";
      continue;
    }

    if (/^(instructions?|method|directions?|steps?):?$/i.test(line)) {
      mode = "instructions";
      continue;
    }

    if (/^(get prepared|cook the veggies|make the mash|cook the beef|make the sauce|serve up|enjoy)[\s:]*$/i.test(line)) {
      mode = "instructions";
      continue;
    }

    // Important fix:
    // If an instruction-looking sentence appears while still in ingredients,
    // move it to instructions instead of contaminating ingredients.
    if (isInstructionLine(line)) {
      mode = "instructions";

      if (!seenInstructions.has(lower)) {
        instructions.push(line);
        seenInstructions.add(lower);
      }

      continue;
    }

    if (mode === "ingredients" || isIngredientLine(line)) {
      if (!seenIngredients.has(lower)) {
        ingredients.push(line);
        seenIngredients.add(lower);
      }
      continue;
    }

    if (mode === "instructions") {
      if (!seenInstructions.has(lower)) {
        instructions.push(line);
        seenInstructions.add(lower);
      }
    }
  }

  // Final safety clean: remove accidental instruction sentences from ingredients
  ingredients = ingredients.filter(item => !isInstructionLine(item));

  return { title, ingredients, instructions };
}

  function preprocessImage(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();

      img.onload = () => {
        const scale = 2;
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width * scale;
        canvas.height = img.height * scale;

        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
          const grey = data[i] * 0.3 + data[i + 1] * 0.59 + data[i + 2] * 0.11;
          const contrast = grey > 155 ? 255 : 0;

          data[i] = contrast;
          data[i + 1] = contrast;
          data[i + 2] = contrast;
        }

        ctx.putImageData(imageData, 0, 0);

        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error("Image processing failed"));
        }, "image/png");
      };

      img.onerror = reject;
      img.src = URL.createObjectURL(file);
    });
  }
  
  cleanBtn.addEventListener("click", () => {
  const text = rawRecipe.value.trim();

  if (!text) {
    alert("Nothing to clean yet.");
    return;
  }

  rawRecipe.value = smartCleanRecipeText(text);
});

  formatBtn.addEventListener("click", () => {
    const text = rawRecipe.value.trim();

    if (!text) {
      alert("Paste a recipe first.");
      return;
    }

    const result = autoFormatRecipe(text);

    titleInput.value = result.title || "";
    ingredientsInput.value = result.ingredients.join("\n");
    instructionsInput.value = result.instructions.join("\n");
  });

  ocrBtn.addEventListener("click", async () => {
    const file = photoInput.files[0];

    if (!file) {
      alert("Choose or take a photo first.");
      return;
    }

    ocrBtn.disabled = true;
    ocrBtn.textContent = "Reading...";
    ocrStatus.textContent = "Preparing image...";

    try {
      const processedImage = await preprocessImage(file);

      const result = await Tesseract.recognize(processedImage, "eng", {
        logger: m => {
          if (m.status && m.progress) {
            ocrStatus.textContent = `${m.status} ${Math.round(m.progress * 100)}%`;
          }
        }
      });

      const cleanedText = cleanOCRText(result.data.text);

      rawRecipe.value = rawRecipe.value
        ? rawRecipe.value + "\n\n" + cleanedText
        : cleanedText;

      ocrStatus.textContent = "Done. Check the text, then click Auto-format.";
    } catch (error) {
      console.error(error);
      ocrStatus.textContent = "Could not read photo. Try a closer cropped photo.";
    }

    ocrBtn.textContent = "Read Photo";
    ocrBtn.disabled = false;
  });

  saveBtn.addEventListener("click", async () => {
  
  if (rawRecipe.value.trim() && (!titleInput.value.trim() || !ingredientsInput.value.trim() || !instructionsInput.value.trim())) {
  const result = autoFormatRecipe(rawRecipe.value.trim());

  if (!titleInput.value.trim()) {
    titleInput.value = result.title || "";
  }

  if (!ingredientsInput.value.trim()) {
    ingredientsInput.value = result.ingredients.join("\n");
  }

  if (!instructionsInput.value.trim()) {
    instructionsInput.value = result.instructions.join("\n");
  }
}
    const title = titleInput.value.trim();

    let ingredients = ingredientsInput.value
  .split(/\r?\n/)
  .map(line => cleanLine(line))
  .filter(Boolean)
  .filter(line => !isInstructionLine(line));

let instructions = instructionsInput.value
  .split(/\r?\n/)
  .map(line => cleanLine(line))
  .filter(Boolean);

const movedInstructions = ingredientsInput.value
  .split(/\r?\n/)
  .map(line => cleanLine(line))
  .filter(Boolean)
  .filter(line => isInstructionLine(line));

instructions = [...movedInstructions, ...instructions];

    if (!title) {
      alert("Please add a recipe title.");
      return;
    }

    if (ingredients.length === 0 && instructions.length === 0) {
      alert("Please add ingredients or instructions.");
      return;
    }

    saveBtn.disabled = true;
    saveBtn.textContent = "Saving...";

    try {
      await addDoc(collection(db, "recipes"), {
        title,
        ingredients,
        instructions,
        rawText: rawRecipe.value.trim(),
        photoUrl: "",
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });

      location.href = "recipes.html";
    } catch (error) {
      console.error(error);
      alert("Could not save recipe. Check Firestore rules.");
      saveBtn.disabled = false;
      saveBtn.textContent = "Save Recipe";
    }
  });
</script>
</body>
</html>
