<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Credit Card Expenses</title>

<style>
  @font-face { font-family: 'LovelyCoffee'; src: url('LovelyCoffee.ttf') format('truetype'); }
  @font-face { font-family: 'LouisGeorgeCafe'; src: url('LouisGeorgeCafe.ttf') format('truetype'); }

  body {
    font-family: 'LouisGeorgeCafe', sans-serif;
    background: url('watercolor.png') no-repeat center center fixed;
    background-size: cover;
    margin: 0;
    padding: 0;
    color: #333;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(20px);
    z-index: -1;
  }

  h1 {
    font-family: 'LovelyCoffee', cursive;
    font-size: 50px;
    text-align: center;
    margin: 18px 0;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 15px;
    margin: 0 auto;
    max-width: 400px;
  }

  input[type="text"], input[type="number"] {
    padding: 14px;
    font-size: 16px;
    border-radius: 12px;
    border: 1px solid #ccc;
    background: #fff;
  }

  button {
    padding: 10px 10px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: #cbc4d6;
    color: black;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }

  /* Active Cards - Glassy */
  #itemsTable {
    display: flex;
    flex-direction: column;
    gap: 12px; /* space between cards */
    padding: 8px;
  }

  #itemsTable tr.active-card-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 12px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(20px) saturate(180%);
    border-radius: 16px;
    font-size: 16px;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    margin-bottom: 8px;
    cursor: grab;
  }

  #itemsTable tr.active-card-row.transferred {
    background: rgba(208,160,163,0.3);
  }
  

  .card-header {
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    font-size: 16px;
  }

  /* Bottom row: input left, remaining right */
  .card-bottom {
    display: flex;
    justify-content: space-between; /* space between input and remaining */
    align-items: center;
    margin-top: 6px;
    gap: 12px; /* editable space between input and remaining */
  }

  .card-bottom input[type="number"] {
    width: 80px;        /* editable input width */
    padding: 6px 8px;
    font-size: 16px;    /* editable font size */
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.3);
    outline: none;
  }

  .card-bottom .remaining {
    font-weight: regular;
    font-size: 14px;    /* editable font size for remaining cost */
    min-width: 80px;
    text-align: right;  /* align remaining to the right */
  }

  .card-bottom button {
    font-size: 20px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 4px;
    transition: transform 0.2s;
  }
  .card-bottom button:hover { transform: scale(1.2); }

  .card-container {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 8px;
    justify-content: center;
  }
  
  .paid-heading-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;

  padding: 0 10px;
  margin-top: 12px;
}

.paid-heading-row h2 {
  margin: 0;
}

.cleanup-btn {
  padding: 7px 10px;
  border-radius: 999px;

  font-size: 12px;
  font-weight: 700;

  background: rgba(255,255,255,0.32);
  border: 1px solid rgba(255,255,255,0.45);

  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}

  .paid-card {
  flex: 1 1 180px;
  min-width: 170px;

  background: rgba(255,255,255,0.30);
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);

  border-radius: 16px;
  padding: 12px;

  font-size: 14px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.08);
  border: 1px solid rgba(255,255,255,0.35);

  position: relative;
}

.paid-card.recent-paid {
  background: linear-gradient(
    135deg,
    rgba(255, 218, 205, 0.58),
    rgba(226, 218, 255, 0.50)
  );

  border: 1px solid rgba(255,255,255,0.65);

  box-shadow:
    0 3px 12px rgba(0,0,0,0.08),
    0 0 16px rgba(255, 190, 170, 0.55),
    0 0 28px rgba(190, 180, 255, 0.35);
}

.paid-card-name {
  font-weight: 800;
  font-size: 15px;
  margin-bottom: 6px;
  overflow-wrap: anywhere;
}

.paid-card-status {
  display: inline-block;
  width: fit-content;

  padding: 3px 8px;
  border-radius: 999px;

  font-size: 11px;
  font-weight: 700;

  background: rgba(255,255,255,0.45);
  border: 1px solid rgba(255,255,255,0.45);

  margin-bottom: 8px;
}

.paid-card-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;

  font-size: 13px;
  margin-top: 4px;
}

.paid-card-label {
  opacity: 0.65;
}

.paid-card-value {
  font-weight: 700;
  text-align: right;
}

.paid-card-date {
  margin-top: 7px;
  font-size: 12px;
  color: #666;
}

.paid-card-payments {
  margin-top: 8px;
  padding-top: 7px;
  border-top: 1px solid rgba(255,255,255,0.35);

  font-size: 12px;
  color: #666;
  line-height: 1.4;
}

 #total {
    font-weight: bold;
    font-size: 16px;
    text-align: center;
    padding: 16px;
    background: rgba(236, 235, 232, 0.95);
    backdrop-filter: blur(25px) saturate(180%);
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);

    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 400px; /* same as your cards/form */
    z-index: 999;
}

/* Add space at bottom so last items are not hidden behind total bar */
#itemsTable, #paidCards {
    padding-bottom: 80px; /* adjust if needed */
}


</style>

</head>
<body>

<h1>💳 Credit Card Expenses</h1>

<form id="itemForm">
  <input type="text" id="itemName" placeholder="Item Name" required>
  <input type="number" id="itemCost" placeholder="Cost" required min="0" step="0.01">
  <button type="submit">Add Item</button>
</form>


<h2>Active Items</h2>
<table id="itemsTable"><tbody></tbody></table>

<div class="paid-heading-row">
  <h2>Fully Paid Items</h2>
  <button id="cleanupOldBtn" type="button" class="cleanup-btn">
    Clean 1yr+
  </button>
</div>

<div id="paidCards" class="card-container"></div>

<div id="total">Total Remaining: $0.00</div>

<div class="bottom-nav">
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAvoNBFAEWNDptC8JIJ2TeuczKuFFmbJVk",
  authDomain: "expenses-a18fa.firebaseapp.com",
  projectId: "expenses-a18fa",
  storageBucket: "expenses-a18fa.appspot.com",
  messagingSenderId: "710897249151",
  appId: "1:710897249151:web:10a31240f099d8e328c84a",
  measurementId: "G-Z0TNKB1L00"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const form = document.getElementById('itemForm');
const itemNameInput = document.getElementById('itemName');
const itemCostInput = document.getElementById('itemCost');
const itemsTableBody = document.querySelector('#itemsTable tbody');
const paidCardsContainer = document.getElementById('paidCards');
const cleanupOldBtn = document.getElementById('cleanupOldBtn');
const totalDiv = document.getElementById('total');

// Add new item
form.addEventListener('submit', e => {
  e.preventDefault();
  const name = itemNameInput.value.trim();
  const cost = parseFloat(itemCostInput.value);
  if (name && !isNaN(cost) && cost >= 0) {
    db.collection('items').add({
      name,
      cost,
      paid: 0,
      transferred: false,
      archived: false,
      lastPayments: [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    itemNameInput.value = '';
    itemCostInput.value = '';
  }
});

// Swipe-to-delete
function makeSwipeToDelete(element, docId, name) {
  let startX = 0, currentX = 0, dragging = false;
  const threshold = 100;

  element.addEventListener('touchstart', e => { startX = e.touches[0].clientX; dragging = true; });
  element.addEventListener('touchmove', e => { if(!dragging) return; currentX = e.touches[0].clientX - startX; if(currentX<0) element.style.transform=`translateX(${currentX}px)`; });
  element.addEventListener('touchend', handleSwipeEnd);

  element.addEventListener('mousedown', e => { startX = e.clientX; dragging = true; element.style.transition = ''; });
  element.addEventListener('mousemove', e => { if(!dragging) return; currentX = e.clientX - startX; if(currentX<0) element.style.transform=`translateX(${currentX}px)`; });
  element.addEventListener('mouseup', handleSwipeEnd);
  element.addEventListener('mouseleave', handleSwipeEnd);

  function handleSwipeEnd() {
    if(!dragging) return; dragging=false;
    if(currentX<-threshold){
      if(confirm(`Delete "${name}"?`)){ db.collection('items').doc(docId).delete(); } else resetPosition();
    } else resetPosition();
    currentX=0;
  }
  function resetPosition(){ element.style.transition='transform 0.3s'; element.style.transform='translateX(0)'; setTimeout(()=>{element.style.transition='';},300); }
}

// Format Firestore timestamp
function formatDate(ts){
  if(ts.toDate) ts = ts.toDate(); 
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}



function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

// Render Active Items
function renderActiveItems(items){
  itemsTableBody.innerHTML='';
  let totalRemaining=0;

  items.forEach(doc=>{
    const item = doc.data();
    const id = doc.id;
    const paid = parseFloat(item.paid)||0;
    const cost = parseFloat(item.cost)||0;
    const remaining = Math.max(cost - paid, 0);
    const isFullyPaid = cost - paid <= 0.001;

    const tr = document.createElement('tr'); 
    tr.classList.add('active-card-row');
    if(item.transferred) tr.classList.add('transferred');

    // Header: store name + cost
    const headerDiv = document.createElement('div'); 
    headerDiv.classList.add('card-header');
    headerDiv.innerHTML = `<span>${item.name}</span><span>Cost: $${cost.toFixed(2)}</span>`;
    tr.appendChild(headerDiv);

    // Input + Remaining line
    const bottomDiv = document.createElement('div');
    bottomDiv.classList.add('card-bottom');

    const inputDiv = document.createElement('input');
    inputDiv.type = 'number';
    inputDiv.min = 0;
    inputDiv.step = 0.01;
    inputDiv.placeholder = '0.00';
    inputDiv.disabled = isFullyPaid;
    bottomDiv.appendChild(inputDiv);

    const remainDiv = document.createElement('div');
    remainDiv.classList.add('remaining'); // NEW: apply editable CSS class
    remainDiv.textContent = `Remaining: $${remaining.toFixed(2)}`;
    bottomDiv.appendChild(remainDiv);

    tr.appendChild(bottomDiv);

    // Timestamp + transfer button line
    const tsDiv = document.createElement('div');
    tsDiv.style.display = 'flex';
    tsDiv.style.justifyContent = 'space-between';
    tsDiv.style.alignItems = 'center';
    tsDiv.style.marginTop = '4px';
    tsDiv.style.fontSize = '12px';
    tsDiv.style.color = '#666';

    const timestamp = document.createElement('span');
    timestamp.textContent = item.createdAt ? formatDate(item.createdAt) : '';
    tsDiv.appendChild(timestamp);

    const transferBtn = document.createElement('button');
    transferBtn.textContent = item.transferred?'💰':'👜';
    transferBtn.title='Mark as transferred';
    transferBtn.style.fontSize = '18px';
    transferBtn.addEventListener('click', ()=>{
      const newTransferred = !item.transferred;
      db.collection('items').doc(id).update({transferred:newTransferred});
      tr.classList.toggle('transferred', newTransferred);
      transferBtn.textContent = newTransferred?'💰':'👜';
    });
    tsDiv.appendChild(transferBtn);

    tr.appendChild(tsDiv);

    // Payment listener
    inputDiv.addEventListener('change', ()=>{
      let payment = parseFloat(inputDiv.value);
      if(isNaN(payment) || payment <= 0){ inputDiv.value=''; return; }
      if(payment > remaining + 0.001){ inputDiv.value=''; return; }
      const newPaid = paid + payment;
      const isNowFullyPaid = cost - newPaid <= 0.001;
      db.collection('items').doc(id).update({
        paid: newPaid,
        archived: isNowFullyPaid,
        lastPayments: firebase.firestore.FieldValue.arrayUnion({amount:payment,date:new Date().toISOString()})
      }).then(()=>{ inputDiv.value=''; });
    });

    makeSwipeToDelete(tr, id, item.name);
    itemsTableBody.appendChild(tr);
    totalRemaining += remaining;
  });

  totalDiv.textContent=`Total Remaining: $${totalRemaining.toFixed(2)}`;
}

// Render Paid Items (showing partial payments)
function renderPaidCards(items){
  paidCardsContainer.innerHTML = '';

  const paidItems = items
    .map(doc => {
      const item = doc.data();
      const payments = Array.isArray(item.lastPayments) ? item.lastPayments : [];

      const latestPayment = payments.length
        ? payments.slice().sort((a, b) => new Date(b.date) - new Date(a.date))[0]
        : null;

      return {
        doc,
        item,
        latestPayment,
        latestDate: latestPayment ? new Date(latestPayment.date) : new Date(0)
      };
    })
    .filter(({ item }) => {
      const paid = Number(item.paid) || 0;
      return item.archived || paid > 0;
    })
    .sort((a, b) => b.latestDate - a.latestDate);

  if (paidItems.length === 0) {
    paidCardsContainer.innerHTML = `
      <div style="font-size:13px; opacity:0.65; padding:10px;">
        No paid items yet
      </div>
    `;
    return;
  }

  paidItems.forEach(({ doc, item, latestPayment }) => {
    const paid = Number(item.paid) || 0;
    const cost = Number(item.cost) || 0;
    const remaining = Math.max(cost - paid, 0);
    const isFullyPaid = remaining <= 0.001;

    const latestAmount = latestPayment ? Number(latestPayment.amount) || 0 : 0;
    const latestDate = latestPayment ? latestPayment.date : null;

    const card = document.createElement('div');
    card.classList.add('paid-card');

    if (latestDate) {
      const daysAgo = (Date.now() - new Date(latestDate).getTime()) / (1000 * 60 * 60 * 24);
      if (daysAgo <= 7) card.classList.add('recent-paid');
    }

    card.innerHTML = `
      <div class="paid-card-name">${escapeHtml(item.name || 'Untitled')}</div>

      <div class="paid-card-status">
        ${isFullyPaid ? 'Fully paid' : 'Part paid'}
      </div>

      <div class="paid-card-row">
        <span class="paid-card-label">Latest payment</span>
        <span class="paid-card-value">$${latestAmount.toFixed(2)}</span>
      </div>

      <div class="paid-card-row">
        <span class="paid-card-label">Total paid</span>
        <span class="paid-card-value">$${paid.toFixed(2)} / $${cost.toFixed(2)}</span>
      </div>

      ${
        !isFullyPaid
          ? `<div class="paid-card-row">
              <span class="paid-card-label">Still owing</span>
              <span class="paid-card-value">$${remaining.toFixed(2)}</span>
            </div>`
          : ''
      }

      <div class="paid-card-date">
        ${latestDate ? `Paid on ${formatDate(latestDate)}` : 'No payment date saved'}
      </div>

      ${
        Array.isArray(item.lastPayments) && item.lastPayments.length > 1
          ? `<div class="paid-card-payments">
              Previous: ${
                item.lastPayments
                  .slice()
                  .sort((a, b) => new Date(b.date) - new Date(a.date))
                  .slice(1, 4)
                  .map(p => `$${Number(p.amount || 0).toFixed(2)}`)
                  .join(', ')
              }
            </div>`
          : ''
      }
    `;

    paidCardsContainer.appendChild(card);
    makeSwipeToDelete(card, doc.id, item.name || 'Untitled');
  });
}

async function deleteOldPaidItems() {
  const oneYearAgo = new Date();
  oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);

  const snapshot = await db.collection('items').get();

  const oldPaidDocs = [];

  snapshot.docs.forEach(doc => {
    const item = doc.data();

    const paid = Number(item.paid) || 0;
    const cost = Number(item.cost) || 0;
    const remaining = Math.max(cost - paid, 0);
    const isFullyPaid = item.archived || remaining <= 0.001;

    if (!isFullyPaid) return;

    const payments = Array.isArray(item.lastPayments) ? item.lastPayments : [];

    if (!payments.length) return;

    const latestPayment = payments
      .slice()
      .sort((a, b) => new Date(b.date) - new Date(a.date))[0];

    if (!latestPayment?.date) return;

    const latestDate = new Date(latestPayment.date);

    if (latestDate < oneYearAgo) {
      oldPaidDocs.push({
        id: doc.id,
        name: item.name || 'Untitled',
        latestDate
      });
    }
  });

  if (oldPaidDocs.length === 0) {
    alert('No fully paid items older than 1 year.');
    return;
  }

  const confirmDelete = confirm(
    `Delete ${oldPaidDocs.length} fully paid item(s) older than 1 year?\n\nThis cannot be undone.`
  );

  if (!confirmDelete) return;

  const batch = db.batch();

  oldPaidDocs.forEach(item => {
    const ref = db.collection('items').doc(item.id);
    batch.delete(ref);
  });

  await batch.commit();

  alert(`Deleted ${oldPaidDocs.length} old paid item(s).`);
}

cleanupOldBtn?.addEventListener('click', deleteOldPaidItems);

// Firestore listener
db.collection('items').orderBy('createdAt').onSnapshot(snapshot=>{
  const activeItems = [];

  snapshot.docs.forEach(doc => {
    const data = doc.data();
    if (!data.archived) activeItems.push(doc);
  });

  renderActiveItems(activeItems);
renderPaidCards(snapshot.docs);
});
</script>

</body>
</html>
