<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe View</title>
  <style>
  :root {
  --bg: #f4f1f6;
  --text: #2f2f38;
  --muted: rgba(55, 55, 65, 0.62);

  --glass: rgba(255, 255, 255, 0.46);
  --glass-strong: rgba(255, 255, 255, 0.64);
  --glass-soft: rgba(255, 255, 255, 0.28);

  --stroke: rgba(255, 255, 255, 0.72);
  --shadow: 0 18px 45px rgba(80, 70, 100, 0.16);
  --inner-glow: inset 0 1px 0 rgba(255,255,255,0.85);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Tahoma, sans-serif;
  color: var(--text);
  padding: 22px;

  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 34%),
    radial-gradient(circle at 85% 12%, rgba(222, 218, 255, 0.78), transparent 32%),
    radial-gradient(circle at 20% 90%, rgba(255, 214, 238, 0.68), transparent 34%),
    linear-gradient(135deg, #f7f3fb, #ebe7f2);
  background-attachment: fixed;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(120deg, rgba(255,255,255,0.32), transparent 38%),
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.45), transparent 45%);
  z-index: -1;
}

.header {
  position: sticky;
  top: 12px;
  z-index: 20;

  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;

  margin-bottom: 20px;
  padding: 10px;
  border-radius: 28px;

  background:
    linear-gradient(145deg, rgba(255,255,255,0.38), rgba(255,255,255,0.14));
  border: 1px solid rgba(255,255,255,0.52);

  backdrop-filter: blur(22px) saturate(1.45);
  -webkit-backdrop-filter: blur(22px) saturate(1.45);

  box-shadow:
    0 16px 40px rgba(80, 70, 100, 0.1),
    inset 0 1px 0 rgba(255,255,255,0.7);
}

.back-btn {
  border: 1px solid var(--stroke);
  border-radius: 999px;
  padding: 10px 16px;

  background:
    linear-gradient(145deg, rgba(255,255,255,0.78), rgba(255,255,255,0.32));
  box-shadow:
    var(--shadow),
    var(--inner-glow);

  backdrop-filter: blur(22px) saturate(1.5);
  -webkit-backdrop-filter: blur(22px) saturate(1.5);

  cursor: pointer;
  font-size: 0.95rem;
  color: var(--text);

  transition:
    transform 0.22s ease,
    box-shadow 0.22s ease,
    background 0.22s ease;
}

.back-btn:hover {
  transform: translateY(-1px) scale(1.015);
  box-shadow:
    0 22px 55px rgba(80, 70, 100, 0.2),
    var(--inner-glow);
}

.back-btn:active {
  transform: scale(0.97);
}

h1 {
  margin: 0 0 18px;
  font-size: 2rem;
  letter-spacing: -0.03em;
  color: rgba(42, 42, 52, 0.94);
}

h2 {
  margin: 0 0 14px;
  font-size: 1.25rem;
  letter-spacing: -0.02em;
  color: rgba(42, 42, 52, 0.9);
}

.card {
  position: relative;
  overflow: hidden;

  border-radius: 30px;
  padding: 18px;
  margin-bottom: 16px;

  border: 1px solid var(--stroke);
  background:
    linear-gradient(145deg, rgba(255,255,255,0.66), rgba(255,255,255,0.25));

  box-shadow:
    0 18px 45px rgba(80, 70, 100, 0.14),
    var(--inner-glow);

  backdrop-filter: blur(24px) saturate(1.55);
  -webkit-backdrop-filter: blur(24px) saturate(1.55);
}

.card::before {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: 29px;
  background:
    linear-gradient(120deg, rgba(255,255,255,0.62), transparent 38%),
    radial-gradient(circle at 18% 0%, rgba(255,255,255,0.65), transparent 34%);
  pointer-events: none;
  opacity: 0.78;
}

.card > * {
  position: relative;
  z-index: 1;
}

.recipe-image {
  width: 100%;
  max-height: 360px;
  object-fit: cover;
  border-radius: 28px;
  margin-bottom: 16px;

  border: 1px solid rgba(255,255,255,0.68);
  box-shadow:
    0 18px 45px rgba(80, 70, 100, 0.16),
    inset 0 1px 0 rgba(255,255,255,0.75);
}

.ingredient {
  display: flex;
  align-items: flex-start;
  gap: 10px;

  padding: 12px;
  margin-bottom: 10px;
  border-radius: 20px;

  border: 1px solid rgba(255,255,255,0.64);
  background:
    linear-gradient(145deg, rgba(255,255,255,0.54), rgba(255,255,255,0.18));

  box-shadow:
    0 10px 24px rgba(80, 70, 100, 0.08),
    inset 0 1px 0 rgba(255,255,255,0.7);

  backdrop-filter: blur(18px) saturate(1.35);
  -webkit-backdrop-filter: blur(18px) saturate(1.35);
}

.ingredient:last-child {
  margin-bottom: 0;
}

.ingredient input[type="checkbox"] {
  width: 18px;
  height: 18px;
  margin-top: 2px;
  accent-color: #c9c4ef;
}

.ingredient input:checked + span {
  text-decoration: line-through;
  color: #999;
}

input:not([type="checkbox"]),
textarea {
  width: 100%;
  border: 1px solid var(--stroke);
  border-radius: 22px;
  padding: 14px 16px;
  margin: 8px 0 14px;

  font-size: 1rem;
  font-family: Tahoma, sans-serif;
  color: var(--text);
  outline: none;

  background:
    linear-gradient(145deg, rgba(255,255,255,0.72), rgba(255,255,255,0.28));

  box-shadow:
    0 14px 35px rgba(80, 70, 100, 0.12),
    var(--inner-glow);

  backdrop-filter: blur(22px) saturate(1.45);
  -webkit-backdrop-filter: blur(22px) saturate(1.45);
}

input:not([type="checkbox"]):focus,
textarea:focus {
  border-color: rgba(255,255,255,0.92);
  box-shadow:
    0 18px 45px rgba(80, 70, 100, 0.16),
    0 0 0 4px rgba(255,255,255,0.22),
    var(--inner-glow);
}

textarea {
  min-height: 140px;
  resize: vertical;
}

label {
  display: block;
  margin-top: 10px;
  margin-bottom: 4px;
  color: var(--muted);
  font-size: 0.9rem;
}

.steps {
  padding-left: 22px;
  line-height: 1.55;
}

.steps li {
  margin-bottom: 12px;
  padding-left: 4px;
}

.loading,
.error {
  text-align: center;
  color: var(--muted);
  margin-top: 40px;
}

.preview-img {
  width: 100%;
  max-height: 260px;
  object-fit: cover;
  border-radius: 24px;
  margin: 10px 0 16px;
  display: none;

  border: 1px solid rgba(255,255,255,0.68);
  box-shadow:
    0 14px 35px rgba(80, 70, 100, 0.14),
    inset 0 1px 0 rgba(255,255,255,0.75);
}

#editBox {
  animation: panelPop 0.26s ease both;
}

@keyframes panelPop {
  from {
    opacity: 0;
    transform: translateY(16px) scale(0.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@media (max-width: 600px) {
  body {
    padding: 16px;
  }

  h1 {
    font-size: 1.55rem;
  }

  .header {
    align-items: flex-start;
  }

  .back-btn {
    padding: 10px 14px;
    font-size: 0.9rem;
  }

  input,
  textarea {
    font-size: 16px;
  }
}
</style>
</head>

<body>
  <div class="header">
    <button class="back-btn" onclick="location.href='recipes.html'">← Back</button>
    <button class="back-btn" id="editBtn">Edit</button>
  </div>

  <div id="loading" class="loading">Loading recipe...</div>
  <div id="error" class="error" style="display:none;">Recipe not found.</div>

  <main id="recipeContent" style="display:none;">
    <img id="recipeImage" class="recipe-image" style="display:none;" />
    <h1 id="recipeTitle"></h1>

    <section class="card">
      <h2>Ingredients</h2>
      <div id="ingredientsList"></div>
    </section>

    <section class="card">
      <h2>Instructions</h2>
      <ol id="instructionsList" class="steps"></ol>
    </section>

    <section class="card" id="editBox" style="display:none;">
      <h2>Edit Recipe</h2>
	  
	  <label>Paste / clean recipe text</label>
<textarea id="editRawText" placeholder="Paste full recipe text here..."></textarea>
<button class="back-btn" id="editAutoFormatBtn">Auto-format Text</button>

      <label>Title</label>
      <input id="editTitle" placeholder="Recipe title" />

      <label>Recipe Image</label>
      <input id="editImageInput" type="file" accept="image/*" />
      <img id="editImagePreview" class="preview-img" />

      <label>Ingredients</label>
      <textarea id="editIngredients"></textarea>

      <label>Instructions</label>
      <textarea id="editInstructions"></textarea>

      <button class="back-btn" id="saveEditBtn">Save Changes</button>
	  
	  
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      updateDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAvoNBFAEWNDptC8JIJ2TeuczKuFFmbJVk",
      authDomain: "expenses-a18fa.firebaseapp.com",
      projectId: "expenses-a18fa",
      storageBucket: "expenses-a18fa.appspot.com",
      messagingSenderId: "710897249151",
      appId: "1:710897249151:web:10a31240f099d8e328c84a",
      measurementId: "G-Z0TNKB1L00"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const recipeId = params.get("id");

    const loading = document.getElementById("loading");
    const error = document.getElementById("error");
    const recipeContent = document.getElementById("recipeContent");
    const recipeTitle = document.getElementById("recipeTitle");
    const recipeImage = document.getElementById("recipeImage");
    const ingredientsList = document.getElementById("ingredientsList");
    const instructionsList = document.getElementById("instructionsList");

    const editBtn = document.getElementById("editBtn");
    const editBox = document.getElementById("editBox");
    const editTitle = document.getElementById("editTitle");
    const editImageInput = document.getElementById("editImageInput");
    const editImagePreview = document.getElementById("editImagePreview");
    const editIngredients = document.getElementById("editIngredients");
    const editInstructions = document.getElementById("editInstructions");
    const saveEditBtn = document.getElementById("saveEditBtn");
	
	const editRawText = document.getElementById("editRawText");
	const editAutoFormatBtn = document.getElementById("editAutoFormatBtn");

    let currentRecipe = null;
    let newImageBase64 = null;

    function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const maxWidth = 900;
      const scale = Math.min(maxWidth / img.width, 1);

      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      const compressedBase64 = canvas.toDataURL("image/jpeg", 0.65);
      resolve(compressedBase64);
    };

    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}
	
	function cleanLine(line) {
  return line
    .replace(/^[-•*]\s*/, "")
    .replace(/^\d+[\).\s-]+/, "")
    .replace(/\s{2,}/g, " ")
    .trim();
}

function autoFormatRecipe(text) {
  const lines = text
    .split(/\r?\n/)
    .map(line => line.trim())
    .filter(Boolean);

  let title = lines[0] || "Untitled Recipe";
  let ingredients = [];
  let instructions = [];

  function looksLikeInstruction(line) {
    return /^(add|mix|cook|boil|fry|bake|stir|pour|heat|serve|place|combine|simmer|drain|reduce|bring|cut|chop|slice|toss|garnish|season|plate)\b/i.test(line);
  }

  function looksLikeIngredient(line) {
    return (
      /\b\d+\s?(g|kg|ml|l|cup|cups|tbsp|tsp|tablespoon|teaspoon|pkt|pack|can|clove|cloves|bottle)\b/i.test(line) ||
      /(salt|pepper|oil|garlic|onion|chicken|beef|pork|fish|egg|flour|sugar|milk|butter|cream|cheese|pesto|spinach|almond|courgette|fettuccine|parmesan|potato|carrot|broccoli)/i.test(line)
    );
  }

  for (let i = 1; i < lines.length; i++) {
    const line = cleanLine(lines[i]);
    const lower = line.toLowerCase();

    if (!line) continue;
    if (lower.includes("ingredients") || lower.includes("instructions") || lower.includes("method")) continue;

    if (looksLikeInstruction(line)) {
      instructions.push(line);
    } else if (looksLikeIngredient(line)) {
      ingredients.push(line);
    }
  }

  return { title, ingredients, instructions };
}

    async function loadRecipe() {
      if (!recipeId) {
        loading.style.display = "none";
        error.style.display = "block";
        return;
      }

      try {
        const recipeRef = doc(db, "recipes", recipeId);
        const snapshot = await getDoc(recipeRef);

        if (!snapshot.exists()) {
          loading.style.display = "none";
          error.style.display = "block";
          return;
        }

        const recipe = snapshot.data();
        currentRecipe = recipe;

        recipeTitle.textContent = recipe.title || "Untitled Recipe";

        const imageData = recipe.imageBase64 || recipe.photoBase64 || recipe.photoUrl || "";

        if (imageData) {
          recipeImage.src = imageData;
          recipeImage.style.display = "block";
        } else {
          recipeImage.style.display = "none";
        }

        ingredientsList.innerHTML = "";
        (recipe.ingredients || []).forEach((ingredient, index) => {
          const row = document.createElement("label");
          row.className = "ingredient";

          row.innerHTML = `
            <input type="checkbox" id="ingredient-${index}">
            <span>${ingredient}</span>
          `;

          ingredientsList.appendChild(row);
        });

        instructionsList.innerHTML = "";
        (recipe.instructions || []).forEach(step => {
          const li = document.createElement("li");
          li.textContent = step;
          instructionsList.appendChild(li);
        });

        loading.style.display = "none";
        recipeContent.style.display = "block";
      } catch (err) {
        console.error(err);
        loading.style.display = "none";
        error.style.display = "block";
      }
    }

    loadRecipe();

    editBtn.addEventListener("click", () => {
      if (!currentRecipe) return;

      editBox.style.display = "block";
	  
	  editRawText.value = currentRecipe.rawText || "";
	  
      editTitle.value = currentRecipe.title || "";
      editIngredients.value = (currentRecipe.ingredients || []).join("\n");
      editInstructions.value = (currentRecipe.instructions || []).join("\n");

      const existingImage = currentRecipe.imageBase64 || currentRecipe.photoBase64 || currentRecipe.photoUrl || "";

      if (existingImage) {
        editImagePreview.src = existingImage;
        editImagePreview.style.display = "block";
      }

      editBtn.style.display = "none";
      editBox.scrollIntoView({ behavior: "smooth" });
    });

    editImageInput.addEventListener("change", async () => {
      const file = editImageInput.files[0];

      if (!file) return;

      newImageBase64 = await fileToBase64(file);

      editImagePreview.src = newImageBase64;
      editImagePreview.style.display = "block";
    });
	
	editAutoFormatBtn.addEventListener("click", () => {
  const text = editRawText.value.trim();

  if (!text) {
    alert("Paste recipe text first.");
    return;
  }

  const result = autoFormatRecipe(text);

  editTitle.value = result.title || editTitle.value;
  editIngredients.value = result.ingredients.join("\n");
  editInstructions.value = result.instructions.join("\n");
});

    saveEditBtn.addEventListener("click", async () => {
      const title = editTitle.value.trim();

      const ingredients = editIngredients.value
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);

      const instructions = editInstructions.value
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);

      if (!title) {
        alert("Please add a recipe title.");
        return;
      }

      saveEditBtn.disabled = true;
      saveEditBtn.textContent = "Saving...";

      const updateData = {
  title,
  ingredients,
  instructions,
  rawText: editRawText.value.trim(),
  updatedAt: serverTimestamp()
};

if (newImageBase64) {
  updateData.imageBase64 = newImageBase64;
}

      try {
        await updateDoc(doc(db, "recipes", recipeId), updateData);
        location.reload();
      } catch (error) {
        console.error(error);
        alert("Could not save changes: " + error.message);
        saveEditBtn.disabled = false;
        saveEditBtn.textContent = "Save Changes";
      }
    });
  </script>
</body>
</html>
