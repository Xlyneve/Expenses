<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipes</title>

  <style>
    :root {
  --bg: #f4f1f6;
  --text: #2f2f38;
  --muted: rgba(55, 55, 65, 0.62);

  --glass: rgba(255, 255, 255, 0.46);
  --glass-strong: rgba(255, 255, 255, 0.64);
  --glass-soft: rgba(255, 255, 255, 0.28);

  --stroke: rgba(255, 255, 255, 0.72);
  --shadow: 0 18px 45px rgba(80, 70, 100, 0.16);
  --inner-glow: inset 0 1px 0 rgba(255,255,255,0.85);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Tahoma, sans-serif;
  color: var(--text);
  padding: 22px;

  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 34%),
    radial-gradient(circle at 85% 12%, rgba(222, 218, 255, 0.78), transparent 32%),
    radial-gradient(circle at 20% 90%, rgba(255, 214, 238, 0.68), transparent 34%),
    linear-gradient(135deg, #f7f3fb, #ebe7f2);
  background-attachment: fixed;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(120deg, rgba(255,255,255,0.32), transparent 38%),
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.45), transparent 45%);
  z-index: -1;
}

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
	
	.recipe-thumb {
  width: 62px;
  height: 62px;
  border-radius: 20px;
  object-fit: cover;
  flex-shrink: 0;
  position: relative;
  z-index: 1;

  background:
    linear-gradient(145deg, rgba(255,255,255,0.72), rgba(255,255,255,0.26));
  border: 1px solid rgba(255,255,255,0.68);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.8),
    0 10px 24px rgba(80, 70, 100, 0.12);
}

.recipe-info {
  flex: 1;
  position: relative;
  z-index: 1;
}

.recipe-title {
  font-size: 1.15rem;
  font-weight: bold;
  margin-bottom: 6px;
  color: rgba(42, 42, 52, 0.94);
}

.recipe-meta {
  font-size: 0.85rem;
  color: var(--muted);
}



    h1 {
      margin: 0;
      font-size: 2rem;
    }

	.recipe-card-wrap {
  position: relative;
  overflow: hidden;
  border-radius: 28px;
}

.recipe-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  cursor: pointer;
  position: relative;
  z-index: 2;
  overflow: hidden;

  border-radius: 28px;
  border: 1px solid var(--stroke);

  background:
    linear-gradient(145deg, rgba(255,255,255,0.66), rgba(255,255,255,0.25));
  box-shadow:
    0 18px 45px rgba(80, 70, 100, 0.14),
    var(--inner-glow);

  backdrop-filter: blur(24px) saturate(1.55);
  -webkit-backdrop-filter: blur(24px) saturate(1.55);

  transition:
    transform 0.25s ease,
    box-shadow 0.25s ease,
    background 0.25s ease;
}

.recipe-card::before {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: 27px;
  background:
    linear-gradient(120deg, rgba(255,255,255,0.62), transparent 38%),
    radial-gradient(circle at 18% 0%, rgba(255,255,255,0.65), transparent 34%);
  pointer-events: none;
  opacity: 0.8;
}

.recipe-card:hover {
  transform: translateY(-2px);
  box-shadow:
    0 24px 58px rgba(80, 70, 100, 0.2),
    var(--inner-glow);
}


.recipe-card-wrap.show-delete .recipe-card {
  transform: translateX(-88px);
}

.delete-btn {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 78px;
  border: none;
  cursor: pointer;
  font-size: 0.8rem;
  z-index: 1;

  color: #8a2b2b;
  background:
    linear-gradient(145deg, rgba(255, 221, 226, 0.9), rgba(255,255,255,0.35));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.7),
    0 16px 35px rgba(138, 43, 43, 0.12);
}
	
    .search {
  width: 100%;
  border: 1px solid var(--stroke);
  border-radius: 22px;
  padding: 15px 17px;
  margin-bottom: 18px;
  font-size: 1rem;
  color: var(--text);
  outline: none;

  background:
    linear-gradient(145deg, rgba(255,255,255,0.72), rgba(255,255,255,0.28));
  box-shadow:
    0 14px 35px rgba(80, 70, 100, 0.12),
    var(--inner-glow);

  backdrop-filter: blur(22px) saturate(1.45);
  -webkit-backdrop-filter: blur(22px) saturate(1.45);
}

.search::placeholder {
  color: rgba(55, 55, 65, 0.42);
}

.search:focus {
  border-color: rgba(255,255,255,0.92);
  box-shadow:
    0 18px 45px rgba(80, 70, 100, 0.16),
    0 0 0 4px rgba(255,255,255,0.22),
    var(--inner-glow);
}

    .recipe-list {
      display: grid;
      gap: 14px;
    }

   

    .empty {
      text-align: center;
      color: #777;
      margin-top: 40px;
    }
	
	.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.shopping-overlay {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.28), transparent 42%),
    rgba(70, 64, 84, 0.26);
  backdrop-filter: blur(18px) saturate(1.3);
  -webkit-backdrop-filter: blur(18px) saturate(1.3);
  z-index: 50;
  padding: 18px;
  overflow-y: auto;
}

.shopping-panel {
  max-width: 620px;
  margin: 30px auto;
  padding: 20px;
  border-radius: 34px;
  border: 1px solid rgba(255,255,255,0.78);

  background:
    linear-gradient(145deg, rgba(255,255,255,0.72), rgba(255,255,255,0.32));
  box-shadow:
    0 28px 75px rgba(40, 35, 60, 0.26),
    inset 0 1px 0 rgba(255,255,255,0.9);

  backdrop-filter: blur(30px) saturate(1.65);
  -webkit-backdrop-filter: blur(30px) saturate(1.65);

  animation: panelPop 0.26s ease both;
}

@keyframes panelPop {
  from {
    opacity: 0;
    transform: translateY(16px) scale(0.97);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.shopping-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.shopping-header h2 {
  margin: 0;
  font-size: 1.4rem;
}


.shopping-subtitle {
  color: #666;
  margin: 12px 0;
  font-size: 0.95rem;
}

.shopping-recipe-choices {
  display: grid;
  gap: 10px;
  margin: 14px 0;
}



.shopping-choice input {
  width: 18px;
  height: 18px;
}

.add-btn,
.shop-btn,
.close-btn,
.build-btn {
  border: 1px solid var(--stroke);
  background:
    linear-gradient(145deg, rgba(255,255,255,0.78), rgba(255,255,255,0.32));
  box-shadow:
    var(--shadow),
    var(--inner-glow);
  backdrop-filter: blur(22px) saturate(1.5);
  -webkit-backdrop-filter: blur(22px) saturate(1.5);
  cursor: pointer;
  color: var(--text);
  transition:
    transform 0.22s ease,
    box-shadow 0.22s ease,
    background 0.22s ease;
}

.add-btn,
.shop-btn,
.build-btn {
  border-radius: 999px;
}

.add-btn {
  padding: 10px 16px;
  font-size: 0.95rem;
}

.shop-btn {
  padding: 10px 14px;
  font-size: 1rem;
}

.close-btn {
  border-radius: 999px;
  width: 38px;
  height: 38px;
  font-size: 1.35rem;
  line-height: 1;
}

.build-btn {
  width: 100%;
  padding: 13px 16px;
  font-size: 1rem;
  margin: 8px 0 16px;
  background:
    linear-gradient(145deg, rgba(255, 247, 196, 0.82), rgba(255,255,255,0.34));
}

.add-btn:hover,
.shop-btn:hover,
.close-btn:hover,
.build-btn:hover {
  transform: translateY(-1px) scale(1.015);
  box-shadow:
    0 22px 55px rgba(80, 70, 100, 0.2),
    var(--inner-glow);
}

.add-btn:active,
.shop-btn:active,
.close-btn:active,
.build-btn:active {
  transform: scale(0.97);
}

.shopping-ingredients {
  display: grid;
  gap: 10px;
}

.shopping-choice,
.shopping-ingredient-item {
  display: flex;
  gap: 10px;
  border-radius: 20px;
  padding: 12px;
  line-height: 1.4;

  border: 1px solid rgba(255,255,255,0.68);
  background:
    linear-gradient(145deg, rgba(255,255,255,0.58), rgba(255,255,255,0.22));
  box-shadow:
    0 12px 28px rgba(80, 70, 100, 0.1),
    inset 0 1px 0 rgba(255,255,255,0.75);

  backdrop-filter: blur(18px) saturate(1.4);
  -webkit-backdrop-filter: blur(18px) saturate(1.4);
}

.shopping-choice {
  align-items: center;
}

.shopping-ingredient-item {
  align-items: flex-start;
}

.shopping-choice input,
.shopping-ingredient-item input {
  width: 18px;
  height: 18px;
  accent-color: #c9c4ef;
}

.shopping-ingredient-item input {
  margin-top: 2px;
}

.shopping-ingredient-item.checked span {
  text-decoration: line-through;
  color: #999;
}

.shopping-empty {
  color: var(--muted);
  text-align: center;
  padding: 16px;
}

.header {
  position: sticky;
  top: 12px;
  z-index: 20;
  padding: 10px;
  border-radius: 28px;

  background:
    linear-gradient(145deg, rgba(255,255,255,0.38), rgba(255,255,255,0.14));
  border: 1px solid rgba(255,255,255,0.52);

  backdrop-filter: blur(22px) saturate(1.45);
  -webkit-backdrop-filter: blur(22px) saturate(1.45);

  box-shadow:
    0 16px 40px rgba(80, 70, 100, 0.1),
    inset 0 1px 0 rgba(255,255,255,0.7);
}

h1 {
  margin: 0;
  font-size: 2rem;
  letter-spacing: -0.03em;
}


	
	@media (max-width: 600px) {
  body {
    padding: 16px;
  }

  h1 {
    font-size: 1.55rem;
  }

  .header {
    align-items: flex-start;
  }

  .add-btn,
.shop-btn,
.build-btn {
  padding: 10px 14px;
  font-size: 0.9rem;
}

  input,
  textarea {
    font-size: 16px;
  }
}


  </style>
</head>

<body>
  <div class="header">
  <h1>Recipes</h1>

  <div class="header-actions">
    <button class="shop-btn" id="shoppingBtn">🛒</button>
    <button class="add-btn" onclick="location.href='add-recipe.html'">+ Add</button>
  </div>
</div>

  <input id="searchInput" class="search" placeholder="Search recipes..." />

  <div id="recipeList" class="recipe-list"></div>
  <div id="emptyState" class="empty" style="display:none;">No recipes yet.</div>
  
  <div id="shoppingOverlay" class="shopping-overlay" style="display:none;">
  <div class="shopping-panel">
    <div class="shopping-header">
      <h2>Shopping List</h2>
      <button id="closeShopping" class="close-btn">×</button>
    </div>

    <p class="shopping-subtitle">Choose recipes you are buying ingredients for:</p>

    <div id="shoppingRecipeChoices" class="shopping-recipe-choices"></div>

    <button id="buildShoppingList" class="build-btn">Show Ingredients</button>

    <div id="shoppingIngredients" class="shopping-ingredients"></div>
  </div>
</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
  getFirestore,
  collection,
  query,
  orderBy,
  onSnapshot,
  doc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Paste your SAME Firebase config here from your expenses project
   const firebaseConfig = {
  apiKey: "AIzaSyAvoNBFAEWNDptC8JIJ2TeuczKuFFmbJVk",
  authDomain: "expenses-a18fa.firebaseapp.com",
  projectId: "expenses-a18fa",
  storageBucket: "expenses-a18fa.appspot.com",
  messagingSenderId: "710897249151",
  appId: "1:710897249151:web:10a31240f099d8e328c84a",
  measurementId: "G-Z0TNKB1L00"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const recipeList = document.getElementById("recipeList");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
	
	const shoppingBtn = document.getElementById("shoppingBtn");
	const shoppingOverlay = document.getElementById("shoppingOverlay");
	const closeShopping = document.getElementById("closeShopping");
	const shoppingRecipeChoices = document.getElementById("shoppingRecipeChoices");
	const buildShoppingList = document.getElementById("buildShoppingList");
	const shoppingIngredients = document.getElementById("shoppingIngredients");

    let recipes = [];

    function renderRecipes() {
  const search = searchInput.value.toLowerCase().trim();

  const filtered = recipes.filter(recipe =>
    recipe.title?.toLowerCase().includes(search)
  );

  recipeList.innerHTML = "";

  if (filtered.length === 0) {
    emptyState.style.display = "block";
    return;
  }

  emptyState.style.display = "none";

  filtered.forEach(recipe => {
    const wrap = document.createElement("div");
    wrap.className = "recipe-card-wrap";

    const card = document.createElement("div");
    card.className = "recipe-card";

    const deleteBtn = document.createElement("button");
    deleteBtn.className = "delete-btn";
    deleteBtn.textContent = "Delete";

    card.onclick = () => {
      location.href = `recipe-view.html?id=${recipe.id}`;
    };

    const ingredientCount = recipe.ingredients?.length || 0;
    const stepCount = recipe.instructions?.length || 0;
    const imageData = recipe.imageBase64 || recipe.photoBase64 || recipe.photoUrl || "";

    card.innerHTML = `
      ${
        imageData
          ? `<img class="recipe-thumb" src="${imageData}" alt="">`
          : `<div class="recipe-thumb"></div>`
      }

      <div class="recipe-info">
        <div class="recipe-title">${recipe.title || "Untitled Recipe"}</div>
        <div class="recipe-meta">
          ${ingredientCount} ingredients · ${stepCount} steps
        </div>
      </div>
    `;

    wrap.appendChild(deleteBtn);
    wrap.appendChild(card);
    recipeList.appendChild(wrap);

    let startX = 0;

    card.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    });

    card.addEventListener("touchend", (e) => {
  const endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) {
    wrap.classList.add("show-delete");
  }

  if (endX - startX > 50) {
    wrap.classList.remove("show-delete");
  }
});

card.addEventListener("contextmenu", (e) => {
  e.preventDefault();
  e.stopPropagation();
  wrap.classList.toggle("show-delete");
});

deleteBtn.addEventListener("click", async (e) => {
  e.stopPropagation();

  const confirmDelete = confirm(`Delete "${recipe.title || "this recipe"}"?`);
  if (!confirmDelete) return;

  await deleteDoc(doc(db, "recipes", recipe.id));
});
  });
}
function renderShoppingRecipes() {
  shoppingRecipeChoices.innerHTML = "";
  shoppingIngredients.innerHTML = "";

  if (recipes.length === 0) {
    shoppingRecipeChoices.innerHTML = `
      <div class="shopping-empty">No recipes available.</div>
    `;
    return;
  }

  recipes.forEach(recipe => {
    const row = document.createElement("label");
    row.className = "shopping-choice";

    row.innerHTML = `
      <input type="checkbox" value="${recipe.id}">
      <span>${recipe.title || "Untitled Recipe"}</span>
    `;

    shoppingRecipeChoices.appendChild(row);
  });
}

function normaliseIngredients(ingredients) {
  if (!ingredients) return [];

  if (Array.isArray(ingredients)) {
    return ingredients
      .map(item => {
        if (typeof item === "string") return item.trim();
        if (item?.name) return item.name.trim();
        return "";
      })
      .filter(Boolean);
  }

  if (typeof ingredients === "string") {
    return ingredients
      .split("\n")
      .map(item => item.trim())
      .filter(Boolean);
  }

  return [];
}

function renderShoppingIngredients() {
  const selectedIds = [...shoppingRecipeChoices.querySelectorAll("input:checked")]
    .map(input => input.value);

  shoppingIngredients.innerHTML = "";

  if (selectedIds.length === 0) {
    shoppingIngredients.innerHTML = `
      <div class="shopping-empty">Tick at least one recipe first.</div>
    `;
    return;
  }

  let allIngredients = [];

  selectedIds.forEach(id => {
    const recipe = recipes.find(item => item.id === id);
    if (!recipe) return;

    const ingredients = normaliseIngredients(recipe.ingredients);

    ingredients.forEach(ingredient => {
      allIngredients.push({
        recipeTitle: recipe.title || "Untitled Recipe",
        ingredient
      });
    });
  });

  if (allIngredients.length === 0) {
    shoppingIngredients.innerHTML = `
      <div class="shopping-empty">No ingredients found for selected recipes.</div>
    `;
    return;
  }

  allIngredients.forEach(item => {
    const row = document.createElement("label");
    row.className = "shopping-ingredient-item";

    row.innerHTML = `
      <input type="checkbox">
      <span>${item.ingredient}</span>
    `;

    const checkbox = row.querySelector("input");

    checkbox.addEventListener("change", () => {
      row.classList.toggle("checked", checkbox.checked);
    });

    shoppingIngredients.appendChild(row);
  });
}

shoppingBtn.addEventListener("click", () => {
  shoppingOverlay.style.display = "block";
  renderShoppingRecipes();
});

closeShopping.addEventListener("click", () => {
  shoppingOverlay.style.display = "none";
});

shoppingOverlay.addEventListener("click", (e) => {
  if (e.target === shoppingOverlay) {
    shoppingOverlay.style.display = "none";
  }
});

buildShoppingList.addEventListener("click", renderShoppingIngredients);

searchInput.addEventListener("input", renderRecipes);

const q = query(collection(db, "recipes"), orderBy("createdAt", "desc"));

onSnapshot(q, snapshot => {
  recipes = snapshot.docs.map(doc => ({
    id: doc.id,
    ...doc.data()
  }));

  renderRecipes();
});
  </script>
</body>
</html>
